<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Smart AI Tutor{% endblock %}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<script>(function(){var t=localStorage.getItem('sat_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
<style>
/* Auth page layout — no sidebar */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--ink);
  padding: 24px 16px;
}

/* Glow background for dark mode */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(79,70,229,.14) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(109,40,217,.1) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
[data-theme="light"] body::before { display: none; }

/* Auth card */
.auth-card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  background: var(--card-bg, rgba(255,255,255,.04));
  border: 1.5px solid var(--border, rgba(255,255,255,.08));
  border-radius: 24px;
  padding: 40px 36px;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
}
[data-theme="light"] .auth-card {
  background: #ffffff;
  border-color: rgba(0,0,0,.1);
  box-shadow: 0 8px 40px rgba(79,70,229,.1);
}

/* Logo at top */
.auth-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  margin-bottom: 28px;
}
.auth-logo-gem {
  width: 40px; height: 40px;
  background: linear-gradient(135deg,#4f46e5,#6d28d9);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 20px rgba(79,70,229,.4);
}
.auth-logo-name {
  font-family: 'Clash Display', sans-serif;
  font-size: 20px; font-weight: 700;
  color: var(--txt, #e2e8f0);
}
[data-theme="light"] .auth-logo-name { color: #1e1b4b; }

/* Theme toggle in auth pages */
.auth-theme-btn {
  position: fixed;
  top: 16px; right: 16px;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer;
  padding: 7px 12px; border-radius: 50px;
  border: 1.5px solid var(--border, rgba(255,255,255,.1));
  background: var(--s1, rgba(255,255,255,.04));
  color: var(--txt2, #94a3b8);
  font-size: 12px; font-weight: 600;
  font-family: 'Instrument Sans', sans-serif;
  z-index: 100;
}
.auth-theme-btn:hover {
  border-color: #4f46e5;
  color: #4f46e5;
  background: rgba(79,70,229,.07);
}
.auth-toggle-track {
  width: 30px; height: 16px; border-radius: 50px;
  background: var(--s2, rgba(255,255,255,.08));
  border: 1.5px solid var(--border, rgba(255,255,255,.1));
  position: relative; flex-shrink: 0;
}
[data-theme="light"] .auth-toggle-track {
  background: linear-gradient(135deg,#4f46e5,#6d28d9);
  border-color: transparent;
}
.auth-toggle-thumb {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--txt3, #475569);
  position: absolute; top: 2px; left: 2px;
  transition: transform .25s cubic-bezier(.4,0,.2,1), background .25s ease !important;
}
[data-theme="light"] .auth-toggle-thumb {
  transform: translateX(14px);
  background: #ffffff;
}
.theme-icon-dark { display: inline; }
.theme-icon-light { display: none; }
[data-theme="light"] .theme-icon-dark { display: none; }
[data-theme="light"] .theme-icon-light { display: inline; }

/* Back to home link */
.auth-back {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--txt3, #475569);
  text-decoration: none;
}
.auth-back:hover { color: #4f46e5; }
</style>
{% block head %}{% endblock %}
</head>
<body>

<!-- Theme toggle fixed top-right -->
<button class="auth-theme-btn" data-theme-toggle title="Switch theme">
  <span class="theme-icon-dark">🌙</span>
  <span class="theme-icon-light">☀️</span>
  <div class="auth-toggle-track">
    <div class="auth-toggle-thumb"></div>
  </div>
</button>

{% block content %}{% endblock %}

<a href="/" class="auth-back">← Back to Home</a>

<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
